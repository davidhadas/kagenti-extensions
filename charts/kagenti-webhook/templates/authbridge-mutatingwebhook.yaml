{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "kagenti-webhook.fullname" . }}-authbridge-mutating-webhook-configuration
  {{- if .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ include "kagenti-webhook.namespace" . }}/{{ include "kagenti-webhook.fullname" . }}-serving-cert
  {{- end }}
webhooks:
- name: inject.kagenti.io
  admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "kagenti-webhook.fullname" . }}-webhook-service
      namespace: {{ include "kagenti-webhook.namespace" . }}
      path: /mutate-workloads-authbridge
  failurePolicy: Fail
  reinvocationPolicy: IfNeeded
  timeoutSeconds: 10
  sideEffects: None
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
          - kube-system
          - kube-public
          - kube-node-lease
          - {{ include "kagenti-webhook.namespace" . }}
    matchLabels:
      # Only trigger webhook for namespaces that have opted-in
      # This aligns with the precedence evaluator Layer 3 which requires kagenti-enabled: true
      kagenti-enabled: "true"
  objectSelector:
    matchExpressions:
      - key: kagenti.io/type
        operator: In
        values:
          - agent
          - tool
      - key: kagenti.io/inject
        operator: NotIn
        values:
          - disabled
  rules:
  - operations:
    - CREATE
    apiGroups:
    - ""
    apiVersions:
    - v1
    resources:
    - pods
{{- end }}
